version: '3.8'

services:
  # PostgreSQL Database
  postgres:
    image: postgres:15-alpine
    container_name: policy-assistant-db
    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
      POSTGRES_DB: policy_assistant
    volumes:
      - postgres_data:/var/lib/postgresql/data
    ports:
      - "5432:5432"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres"]
      interval: 5s
      timeout: 5s
      retries: 5
    networks:
      - policy-assistant-network

  # Backend API
  backend:
    build: ./backend
    container_name: policy-assistant-backend
    environment:
      DATABASE_URL: postgresql://postgres:postgres@postgres:5432/policy_assistant
      OPENAI_API_KEY: ${OPENAI_API_KEY}
      SECRET_KEY: ${SECRET_KEY:-change-this-in-production}
      ACCESS_TOKEN_EXPIRE_MINUTES: 30
      FAISS_INDEX_PATH: /app/data/faiss_index
      GOOGLE_DRIVE_CREDENTIALS_PATH: /app/credentials.json
      DEBUG: false
    volumes:
      - backend_data:/app/data
      - ./backend/credentials.json:/app/credentials.json:ro
    ports:
      - "8000:8000"
    depends_on:
      postgres:
        condition: service_healthy
    networks:
      - policy-assistant-network
    restart: unless-stopped

  # Frontend (React)
  frontend:
    build: ./frontend
    container_name: policy-assistant-frontend
    ports:
      - "80:80"
    depends_on:
      - backend
    networks:
      - policy-assistant-network
    restart: unless-stopped

volumes:
  postgres_data:
  backend_data:

networks:
  policy-assistant-network:
    driver: bridge
